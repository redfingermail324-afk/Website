<!DOCTYPE html>
<html lang="id">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { 
            background: #000; color: #fff; font-family: 'Courier New', monospace; 
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        /* --- SCANLINE EFFECT --- */
        body::after {
            content: " "; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(255, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 100;
        }

        .container {
            width: 90%; max-width: 600px; padding: 30px; border: 1px solid #300;
            background: rgba(5, 0, 0, 0.95); text-align: center; position: relative;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.15); border-radius: 10px;
        }

        /* --- TITLE GLITCH --- */
        .glitch {
            font-size: 2.2rem; font-weight: 900; color: #ff0000; letter-spacing: 5px;
            text-shadow: 2px 0 #fff, -2px 0 #500; animation: noise 0.2s infinite;
        }
        @keyframes noise {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        .ptero-box { 
            background: #080000; border: 1px dashed #500; padding: 15px; margin: 20px 0;
            border-radius: 5px; position: relative;
        }
        .badge { background: #ff0000; color: #000; padding: 2px 10px; font-weight: bold; font-size: 0.7rem; }
        
        #timer { font-size: 1.8rem; color: #ff0000; font-weight: bold; text-shadow: 0 0 10px #ff0000; margin-top: 10px; display: block; }

        .team { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .card { 
            background: #000; border: 1px solid #222; padding: 10px; width: 140px; 
            cursor: pointer; transition: 0.2s; text-decoration: none;
        }
        .card:hover { border-color: #ff0000; transform: scale(1.05); }
        .card b { font-size: 0.8rem; color: #fff; display: block; }
        .card span { font-size: 0.6rem; color: #666; }

        .ascii { font-size: 0.4rem; color: #300; margin-top: 15px; line-height: 1; }
        
        /* Shadow line moving */
        .shadow-move {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, transparent 0%, rgba(255,0,0,0.1) 50%, transparent 100%);
            animation: move 3s linear infinite; pointer-events: none;
        }
        @keyframes move { from { top: -100%; } to { top: 100%; } }
    </style>
</head>
<body>

    <div class="shadow-move"></div>

        </div>
    </div>

    <script>
        // Countdown 24h
        function startTimer(d, display) {
            let t = d, h, m, s;
            setInterval(() => {
                h = parseInt(t / 3600, 10); m = parseInt((t % 3600) / 60, 10); s = parseInt(t % 60, 10);
                display.textContent = (h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
                if (--t < 0) t = d;
            }, 1000);
        }

        // Typewriter
        const text = ">_ Deleting all server data... Unauthorized access detected. node.pterodactyl.local is now under our control.";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++; setTimeout(type, 40);
            }
        }

        window.onload = () => {
            startTimer(86400, document.getElementById('timer'));
            type();
        };
    </script>
</body>
</html>
